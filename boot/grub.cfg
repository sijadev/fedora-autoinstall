# Fedora Install Profiles — Custom GRUB2
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  [f]  Vollinstallation  →  Anaconda → fedora-full.ks                   │
# │  [d]  Debug-Install     →  Text-Modus + Serial-Log                     │
# │  [m]  VM-Test           →  Anaconda → fedora-vm.ks                     │
# │  [t]  Theme + Bash      ─┐ laufen auf BESTEHENDEM System:              │
# │  [h]  Headless vLLM     ─┘ fedora-provision.sh vom USB starten         │
# └─────────────────────────────────────────────────────────────────────────┘
#
# Disk-Override: Im GRUB-Menü (e) an die linux-Zeile anhängen:
#   inst.disk=nvme1n1      (z.B. zweite NVMe)
#   inst.disk=sdb          (z.B. zweite SATA-Disk)

set timeout=10
set default=0

set STAGE2="inst.stage2=https://dl.fedoraproject.org/pub/fedora/linux/releases/43/Everything/x86_64/os/"
set BLACKWELL="nomodeset rd.driver.blacklist=nouveau modprobe.blacklist=nouveau nvidia-drm.modeset=0 video=efifb:off video=simpledrm:off"
# rd.retry=30: USB-Stick braucht Zeit bis LABEL=FEDORA-USB erkannt wird
set KSBASE="rd.retry=30 inst.ks=hd:LABEL=FEDORA-USB"

# ── [f] Vollinstallation ──────────────────────────────────────────────────────
menuentry "Fedora -- [f] Vollinstallation  (Anaconda → fedora-full.ks)" --hotkey=f {
    search --no-floppy --label --set=root FEDORA-USB
    linux  /boot/vmlinuz \
           ${STAGE2} \
           ${KSBASE}:/kickstart/fedora-full.ks \
           ${BLACKWELL} inst.text inst.loglevel=debug \
           rd.multipath=0 rd.dm=0 nompath quiet
    initrd /boot/initrd.img
}

# ── [f1] Test: Minimal Args ───────────────────────────────────────────────────
menuentry "Fedora -- [f1] Test: Minimal Args (ohne NVIDIA/Multipath)" --hotkey=1 {
    search --no-floppy --label --set=root FEDORA-USB
    linux  /boot/vmlinuz \
           ${STAGE2} \
           ${KSBASE}:/kickstart/fedora-full.ks \
           nomodeset video=efifb:off video=simpledrm:off \
           inst.text quiet
    initrd /boot/initrd.img
}

# ── [d] Debug-Install ─────────────────────────────────────────────────────────
menuentry "Fedora -- [d] Debug-Install    (Text-Modus + Serial-Log)" --hotkey=d {
    search --no-floppy --label --set=root FEDORA-USB
    linux  /boot/vmlinuz \
           ${STAGE2} \
           ${KSBASE}:/kickstart/fedora-full.ks \
           inst.text inst.loglevel=debug inst.nokill \
           rd.multipath=0 \
           rd.driver.blacklist=nouveau modprobe.blacklist=nouveau \
           video=efifb:off video=simpledrm:off \
           console=tty0 console=ttyS0,115200 \
           systemd.log_level=debug systemd.log_target=kmsg
    initrd /boot/initrd.img
}

# ── [m] VM-Test — fedora-vm.ks ───────────────────────────────────────────────
menuentry "Fedora -- [m] VM-Test           (Anaconda → fedora-vm.ks)" --hotkey=m {
    search --no-floppy --label --set=root FEDORA-USB
    linux  /boot/vmlinuz \
           ${STAGE2} \
           ${KSBASE}:/kickstart/fedora-vm.ks \
           nomodeset rd.retry=30 quiet
    initrd /boot/initrd.img
}

# ── [t] Theme + Bash ─────────────────────────────────────────────────────────
menuentry "Fedora -- [t] Theme + Bash       (bestehende Installation → Provisioner)" --hotkey=t {
    echo ""
    echo "Dieses Profil installiert kein neues System."
    echo "Im laufenden System ausfuehren:"
    echo ""
    echo "  sudo bash /run/media/USER/FEDORA-USB/fedora-provision.sh --profile theme-bash"
    echo ""
    echo "Taste druecken um fortzufahren ..."
    read dummy
}

# ── [h] Headless vLLM ────────────────────────────────────────────────────────
menuentry "Fedora -- [h] Headless vLLM      (bestehende Installation → Provisioner)" --hotkey=h {
    echo ""
    echo "Dieses Profil installiert kein neues System."
    echo "Im laufenden System ausfuehren:"
    echo ""
    echo "  sudo bash /run/media/USER/FEDORA-USB/fedora-provision.sh --profile headless-vllm"
    echo ""
    echo "Taste druecken um fortzufahren ..."
    read dummy
}
