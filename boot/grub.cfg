# Fedora Install Profiles — Custom GRUB2 (kein Ventoy, kein ISO-Loopback)
#
# Kernel: Bazzite-Kernel aus COPR (sm_120/Blackwell-Support)
# Stage2: Fedora Mirror (Netzwerk) — kein ISO auf USB nötig
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  [f]  Vollinstallation  →  Anaconda → fedora-full.ks                   │
# │  [d]  Debug-Install     →  Text-Modus + Serial-Log                     │
# │  [m]  VM-Test           →  Anaconda → fedora-vm.ks                     │
# │  [t]  Theme + Bash      ─┐ laufen auf BESTEHENDEM System:              │
# │  [h]  Headless vLLM     ─┘ fedora-provision.sh vom USB starten         │
# └─────────────────────────────────────────────────────────────────────────┘
#
# Disk-Override: Im GRUB-Menü (e) an die linux-Zeile anhängen:
#   inst.disk=nvme1n1      (z.B. zweite NVMe)
#   inst.disk=sdb          (z.B. zweite SATA-Disk)
# Ohne Override: größte interne Disk wird automatisch gewählt.

set timeout=10
set default=0

STAGE2="inst.stage2=https://dl.fedoraproject.org/pub/fedora/linux/releases/43/Everything/x86_64/os/"
BLACKWELL="nomodeset rd.driver.blacklist=nouveau modprobe.blacklist=nouveau nvidia-drm.modeset=0 video=efifb:off video=simpledrm:off"

# ── [f] Vollinstallation — Anaconda + fedora-full.ks ─────────────────────────
# Bazzite-Kernel: Blackwell (RTX 50/9070) bootet ohne iGPU-Workaround
menuentry "Fedora -- [f] Vollinstallation  (Anaconda → fedora-full.ks)" --hotkey=f {
    search --no-floppy --label --set=root FEDORA-USB
    linux  /boot/vmlinuz \
           ${STAGE2} \
           inst.ks=hd:LABEL=FEDORA-USB:/kickstart/fedora-full.ks \
           ${BLACKWELL} inst.text inst.loglevel=debug \
           rd.multipath=0 rd.dm=0 nompath quiet
    initrd /boot/initrd.img
}

# ── [f1] Test: Ohne Device-Mapper/Multipath/NVIDIA-Args ─────────────────────────
menuentry "Fedora -- [f1] Test: Minimal Args (ohne NVIDIA/Multipath)" --hotkey=1 {
    search --no-floppy --label --set=root FEDORA-USB
    linux  /boot/vmlinuz \
           ${STAGE2} \
           inst.ks=hd:LABEL=FEDORA-USB:/kickstart/fedora-full.ks \
           nomodeset video=efifb:off video=simpledrm:off \
           inst.text quiet
    initrd /boot/initrd.img
}

# ── [f2] Test: Mit Debug-Logging + rd.dm=0 ──────────────────────────────────────
menuentry "Fedora -- [f2] Test: Debug + rd.dm=0" --hotkey=2 {
    search --no-floppy --label --set=root FEDORA-USB
    linux  /boot/vmlinuz \
           ${STAGE2} \
           inst.ks=hd:LABEL=FEDORA-USB:/kickstart/fedora-full.ks \
           ${BLACKWELL} inst.text inst.loglevel=debug inst.nokill \
           rd.multipath=0 rd.dm=0 nompath \
           rd.driver.blacklist=nouveau modprobe.blacklist=nouveau \
           console=tty0 console=ttyS0,115200 \
           systemd.log_level=debug
    initrd /boot/initrd.img
}

# ── [d] Debug-Install — Text-Modus + vollständiges Logging auf USB-Stick ──────
# Nutzen wenn [f] hängt oder keine Bildschirmausgabe zeigt.
# Logs landen auf dem USB-Stick unter: /logs/anaconda-<datum>.log
#
# TTY-Switch zur Diagnose (wenn Bildschirm schwarz bleibt):
#   Ctrl+Alt+F1  → Hauptkonsole / Anaconda-UI
#   Ctrl+Alt+F2  → Root-Shell (Diagnose, dmesg, journalctl)
#   Ctrl+Alt+F3  → Installations-Log (anaconda.log)
#   Ctrl+Alt+F4  → Storage-Log
#   Ctrl+Alt+F5  → Programm-Log
# Mindestens 90 Sekunden warten bevor TTY-Switch — stage2 lädt netinst nach.
menuentry "Fedora -- [d] Debug-Install    (Text-Modus + Log auf USB-Stick)" --hotkey=d {
    search --no-floppy --label --set=root FEDORA-USB
    linux  /boot/vmlinuz \
           ${STAGE2} \
           inst.ks=hd:LABEL=FEDORA-USB:/kickstart/fedora-full.ks \
           inst.text inst.loglevel=debug inst.nokill \
           rd.multipath=0 \
           rd.driver.blacklist=nouveau modprobe.blacklist=nouveau \
           video=efifb:off video=simpledrm:off \
           console=tty0 console=ttyS0,115200 \
           systemd.log_level=debug systemd.log_target=kmsg
    initrd /boot/initrd.img
}

# ── [m] VM-Test — Anaconda + fedora-vm.ks (KVM/virtio, 80GB vda) ─────────────
menuentry "Fedora -- [m] VM-Test           (Anaconda → fedora-vm.ks)" --hotkey=m {
    search --no-floppy --label --set=root FEDORA-USB
    linux  /boot/vmlinuz \
           ${STAGE2} \
           inst.ks=hd:LABEL=FEDORA-USB:/kickstart/fedora-vm.ks \
           nomodeset quiet
    initrd /boot/initrd.img
}

# ── [t] Theme + Bash — Provisioner auf bestehendem System starten ────────────
menuentry "Fedora -- [t] Theme + Bash       (bestehende Installation → Provisioner)" --hotkey=t {
    echo ""
    echo "Dieses Profil installiert kein neues System."
    echo "Im laufenden System ausfuehren:"
    echo ""
    echo "  sudo bash /run/media/USER/FEDORA-USB/fedora-provision.sh --profile theme-bash"
    echo ""
    echo "Taste druecken um fortzufahren ..."
    sleep -1
}

# ── [h] Headless vLLM (Podman) — Provisioner auf bestehendem System ──────────
menuentry "Fedora -- [h] Headless vLLM      (bestehende Installation → Provisioner)" --hotkey=h {
    echo ""
    echo "Dieses Profil installiert kein neues System."
    echo "Im laufenden System ausfuehren:"
    echo ""
    echo "  sudo bash /run/media/USER/FEDORA-USB/fedora-provision.sh --profile headless-vllm"
    echo ""
    echo "Taste druecken um fortzufahren ..."
    sleep -1
}
